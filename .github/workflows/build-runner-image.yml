name: Build Runner Image

on:
  push:
    branches: [main]
    paths:
      - runner/Dockerfile
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arinnous
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runner
          push: true
          tags: |
            nousresearch/nous-gke-runner:latest
            nousresearch/nous-gke-runner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
