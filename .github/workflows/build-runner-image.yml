name: Build Runner Image

on:
  push:
    branches: [main]
    paths:
      - runner/Dockerfile
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runner
          push: true
          tags: |
            ghcr.io/ethernet8023/actions-runner-deps:latest
            ghcr.io/ethernet8023/actions-runner-deps:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
